interface:
  display_name: "LAN Orchestrator MCP"
  short_description: "Operate the LAN annotation service"
  default_prompt: "Use $lan-orchestrator-mcp to operate the LAN annotation service through MCP workflows."

dependencies:
  tools:
    - type: "mcp"
      value: "lan-orchestrator"
      description: "Local LAN orchestrator MCP server"
      transport: "streamable_http"
      url: "http://127.0.0.1:8001/mcp"

policy:
  allow_implicit_invocation: true
